name = "navegador-social"
compatibility_date = "2024-09-23"

# Cloudflare Workers + Assets: sirve el frontend estático desde el edge
[assets]
directory = "frontend/out"

# Variable de build: Next.js la incrusta en el bundle estático
# Actualiza este valor con la URL de tu Worker backend después de:
#   cd backend-worker && npx wrangler deploy
[vars]
NEXT_PUBLIC_API_URL = "https://navegador-social-api.jmlagos2003.workers.dev"
